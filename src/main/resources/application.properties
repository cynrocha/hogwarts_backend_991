# Puerto en el que escucha Spring Boot internamente
server.port=8080

# Servicio de la base de datos MariaDB
# Usamos el driver de MariaDB y el puerto externo 4306 por defecto
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:4306}/${DB_NAME:hogwarts_xxx}
spring.datasource.username=${DB_USER:aaee_xxx}
spring.datasource.password=${DB_PASSWORD:1234}

# Par·metros del Pool de conexiones HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2